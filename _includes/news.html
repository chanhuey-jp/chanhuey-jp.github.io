<!-- Latest blog posts, shown as a compact News feed on the About page -->
<ul class="news-list">
  {% for post in site.posts limit:6 %}
  <li>
    <span class="news-date">{{ post.date | date: "%Y.%m" }}</span>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>
<p class="news-more"><a href="{{ '/year-archive/' | relative_url }}">See all posts &rarr;</a></p>
